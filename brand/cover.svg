<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="Aegis cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.55" stop-color="#0ea5b7"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a5f3fc"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="wm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e2f7fb"/>
      <stop offset="1" stop-color="#9bd2ff"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.5">
    <path d="M0 160 H1280 M0 320 H1280 M0 480 H1280"/>
    <path d="M320 0 V640 M640 0 V640 M960 0 V640"/>
  </g>

  <!-- shield mark -->
  <g transform="translate(170 150) scale(0.66)">
    <path d="M256 56 L412 116 V252 C412 356 344 430 256 466 C168 430 100 356 100 252 V116 Z"
          fill="url(#shield)" stroke="url(#edge)" stroke-width="10" stroke-linejoin="round"/>
    <g fill="#ffffff">
      <rect x="232" y="168" width="48" height="168" rx="12"/>
      <rect x="172" y="228" width="168" height="48" rx="12"/>
    </g>
    <g fill="url(#shield)">
      <circle cx="256" cy="246" r="17"/>
      <path d="M248 256 L264 256 L270 300 L242 300 Z"/>
    </g>
  </g>

  <!-- wordmark + tagline -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif">
    <text x="470" y="250" fill="url(#wm)" font-size="128" font-weight="800" letter-spacing="6">AEGIS</text>
    <text x="476" y="312" fill="#7dd3fc" font-size="30" font-weight="600" letter-spacing="0.5">Healthcare claims &amp; reimbursement agent</text>
    <text x="476" y="372" fill="#cbd5e1" font-size="24">Moves money &amp; touches PHI — yet cannot leak or steal it.</text>
    <g>
      <rect x="476" y="408" width="330" height="44" rx="22" fill="#0ea5b7" opacity="0.18" stroke="#22d3ee" stroke-opacity="0.5"/>
      <text x="498" y="437" fill="#a5f3fc" font-size="22" font-weight="600">Built on Terminal 3 Agent Auth</text>
      <rect x="820" y="408" width="250" height="44" rx="22" fill="#16a34a" opacity="0.16" stroke="#22c55e" stroke-opacity="0.5"/>
      <text x="842" y="437" fill="#86efac" font-size="22" font-weight="700">7/7 attacks defeated</text>
    </g>
  </g>
</svg>
