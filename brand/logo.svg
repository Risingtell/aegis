<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Aegis logo">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.55" stop-color="#0ea5b7"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a5f3fc"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0b1220" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- shield -->
  <g filter="url(#ds)">
    <path d="M256 56 L412 116 V252 C412 356 344 430 256 466 C168 430 100 356 100 252 V116 Z"
          fill="url(#shield)" stroke="url(#edge)" stroke-width="10" stroke-linejoin="round"/>
    <!-- inner bevel -->
    <path d="M256 92 L380 140 V250 C380 336 326 398 256 430 C186 398 132 336 132 250 V140 Z"
          fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="6" stroke-linejoin="round"/>
  </g>

  <!-- medical cross -->
  <g fill="#ffffff">
    <rect x="232" y="168" width="48" height="168" rx="12"/>
    <rect x="172" y="228" width="168" height="48" rx="12"/>
  </g>

  <!-- keyhole (security) carved into the cross -->
  <g fill="url(#shield)">
    <circle cx="256" cy="246" r="17"/>
    <path d="M248 256 L264 256 L270 300 L242 300 Z"/>
  </g>

  <!-- node accents -->
  <g fill="#a5f3fc">
    <circle cx="412" cy="116" r="9"/>
    <circle cx="100" cy="116" r="9"/>
    <circle cx="256" cy="466" r="9"/>
  </g>
</svg>
